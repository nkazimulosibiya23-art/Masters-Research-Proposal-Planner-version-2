<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #1a1e28;
    --border: #2a2f3d;
    --accent: #c8a96e;
    --accent2: #7b9cda;
    --accent3: #6dcba8;
    --text: #e8e6e0;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --not-started: #3a3f52;
    --in-progress: #7b9cda;
    --completed: #6dcba8;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .overall-progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .overall-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .overall-bar-outer {
    width: 160px;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .overall-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }
  .overall-pct {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    min-width: 36px;
    text-align: right;
  }
  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--not-started);
    transition: background 0.3s;
  }
  .sync-dot.syncing { background: var(--in-progress); animation: pulse 1s infinite; }
  .sync-dot.synced { background: var(--completed); }
  .sync-dot.error { background: #e07a5f; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .reset-btn:hover { color: var(--text-muted); border-color: var(--text-dim); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--completed);
    color: var(--completed);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error-toast { border-color: #e07a5f; color: #e07a5f; }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 16px;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* LAYOUT */
  .layout {
    display: flex;
    min-height: calc(100vh - 60px);
  }
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 18px 10px;
  }
  .nav-item {
    padding: 10px 18px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active { border-left-color: var(--accent); background: rgba(200,169,110,0.07); }
  .nav-item-title { font-size: 12px; font-weight: 500; color: var(--text-muted); flex: 1; }
  .nav-item.active .nav-item-title { color: var(--accent); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* MAIN */
  .main { flex: 1; padding: 28px 32px; overflow-y: auto; }

  /* SECTION CARD */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .section-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .section-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .section-card.expanded .section-header { border-bottom-color: var(--border); }
  .section-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 22px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
  .section-meta { display: flex; align-items: center; gap: 12px; }
  .resource-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .section-pct { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; min-width: 34px; text-align: right; }
  .chevron { color: var(--text-dim); font-size: 12px; transition: transform 0.3s; }
  .section-card.expanded .chevron { transform: rotate(90deg); }
  .section-prog-bar { height: 3px; background: var(--surface2); overflow: hidden; }
  .section-prog-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .section-body { display: none; padding: 16px 20px 20px; }
  .section-card.expanded .section-body { display: block; }
  .frameworks-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .framework-chip {
    background: rgba(123,156,218,0.1);
    border: 1px solid rgba(123,156,218,0.25);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
  }
  .tasks-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface2);
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .task-row:hover { border-color: var(--accent); }
  .task-row.saving { opacity: 0.6; pointer-events: none; }
  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 10px;
  }
  .task-row[data-status="completed"] .task-check { background: var(--completed); border-color: var(--completed); color: #0d0f14; }
  .task-row[data-status="in-progress"] .task-check { border-color: var(--in-progress); background: rgba(123,156,218,0.15); }
  .task-text { flex: 1; font-size: 13px; color: var(--text); }
  .task-row[data-status="completed"] .task-text { color: var(--text-muted); text-decoration: line-through; }
  .task-status-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    background: transparent;
  }
  .status-not-started { color: var(--text-dim); border-color: var(--not-started); }
  .status-in-progress { color: var(--in-progress); border-color: var(--in-progress); }
  .status-completed { color: var(--completed); border-color: var(--completed); }
  .resources-section { margin-top: 4px; }
  .resources-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .resources-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .resource-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .resource-icon { font-size: 12px; }
  .resource-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); font-weight: 500; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  .legend { display: flex; gap: 16px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .section-intro { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; font-style: italic; }
  .tip-box {
    background: rgba(200,169,110,0.06);
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent);
    margin-top: 12px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .tip-icon { flex-shrink: 0; }
</style>
</head>

      { id: 't41', text: 'Compile all global/international journal articles (target: 20+)' },
      { id: 't42', text: 'Compile all SA-specific journal articles (target: 10+)' },
      { id: 't43', text: 'Add seminal theoretical books (Christensen, Osterwalder, Porter, Davis)' },
      { id: 't44', text: 'Format all references in Harvard style consistently' },
      { id: 't45', text: 'Verify all DOIs and URLs are live and accessible' },
      { id: 't46', text: 'Cross-check every in-text citation has a reference entry' },
    ]
  }
];

// ── STATE ─────────────────────────────────────────────────────
const taskStatus = {};
sections.forEach(s => s.tasks.forEach(t => { taskStatus[t.id] = 'not-started'; }));
const expandedSections = new Set(['intro']);

const statusCycle = ['not-started', 'in-progress', 'completed'];
const statusLabel = { 'not-started': 'Not Started', 'in-progress': 'In Progress', 'completed': 'Done' };
const statusClass = { 'not-started': 'status-not-started', 'in-progress': 'status-in-progress', 'completed': 'status-completed' };
const checkIcon = { 'not-started': '', 'in-progress': '◐', 'completed': '✓' };

// ── SYNC UI ───────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  const labels = { syncing: 'Saving...', synced: 'Live · Synced', error: 'Sync error', connecting: 'Connecting...' };
  label.textContent = labels[state] || state;
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error-toast' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SUPABASE OPERATIONS ───────────────────────────────────────
async function loadFromSupabase() {
  try {
    setSyncState('connecting');
    const { data, error } = await sb.from('task_progress').select('task_id, status');
    if (error) throw error;
    if (data) {
      data.forEach(row => {
        if (taskStatus.hasOwnProperty(row.task_id)) {
          taskStatus[row.task_id] = row.status;
        }
      });
    }
    setSyncState('synced');
  } catch (e) {
    console.error('Load error:', e);
    setSyncState('error');
    showToast('Could not load from Supabase — check your table exists', true);
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
    renderAll();
  }
}

async function saveTaskToSupabase(taskId, status) {
  setSyncState('syncing');
  try {
    const { error } = await sb.from('task_progress').upsert(
      { task_id: taskId, status: status, updated_at: new Date().toISOString() },
      { onConflict: 'task_id' }
    );
    if (error) throw error;
    setSyncState('synced');
    showToast('✓ Saved to Supabase');
  } catch (e) {
    console.error('Save error:', e);
    setSyncState('error');
    showToast('Save failed — check connection', true);
  }
}

async function resetAll() {
  if (!confirm('Reset all task progress? This will clear your Supabase data too.')) return;
  sections.forEach(s => s.tasks.forEach(t => { taskStatus[t.id] = 'not-started'; }));
  expandedSections.clear();
  expandedSections.add('intro');
  setSyncState('syncing');
  try {
    const allIds = sections.flatMap(s => s.tasks.map(t => t.id));
    const rows = allIds.map(id => ({ task_id: id, status: 'not-started', updated_at: new Date().toISOString() }));
    const { error } = await sb.from('task_progress').upsert(rows, { onConflict: 'task_id' });
    if (error) throw error;
    setSyncState('synced');
    showToast('✓ Progress reset');
  } catch (e) {
    setSyncState('error');
    showToast('Reset failed on server', true);
  }
  renderAll();
}

// ── INTERACTIONS ──────────────────────────────────────────────
async function cycleTask(taskId) {
  const cur = taskStatus[taskId];
  const idx = statusCycle.indexOf(cur);
  const next = statusCycle[(idx + 1) % statusCycle.length];
  taskStatus[taskId] = next;
  renderAll();
  await saveTaskToSupabase(taskId, next);
}

function toggleSection(id) {
  if (expandedSections.has(id)) expandedSections.delete(id);
  else expandedSections.add(id);
  renderAll();
}

function scrollToSection(id) {
  if (!expandedSections.has(id)) { expandedSections.add(id); renderAll(); }
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.id === id);
  });
}

// ── RENDER ────────────────────────────────────────────────────
function getSectionProgress(section) {
  const total = section.tasks.length;
  const done = section.tasks.filter(t => taskStatus[t.id] === 'completed').length;
  return total ? Math.round((done / total) * 100) : 0;
}

function getOverallProgress() {
  const allTasks = sections.flatMap(s => s.tasks);
  const done = allTasks.filter(t => taskStatus[t.id] === 'completed').length;
  return allTasks.length ? Math.round((done / allTasks.length) * 100) : 0;
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = sections.map(s => {
    const pct = getSectionProgress(s);
    const dotColor = pct === 100 ? 'var(--completed)' : pct > 0 ? 'var(--in-progress)' : 'var(--not-started)';
    return `<div class="nav-item" data-id="${s.id}" onclick="scrollToSection('${s.id}')">
      <span class="nav-item-title">${s.num} ${s.title}</span>
      <span class="nav-dot" style="background:${dotColor}"></span>
    </div>`;
  }).join('');
}

function renderSections() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = sections.map(s => {
    const pct = getSectionProgress(s);
    const progColor = pct === 100 ? 'var(--completed)' : pct > 0 ? 'var(--in-progress)' : 'var(--not-started)';
    const pctColor = pct === 100 ? 'var(--completed)' : pct > 0 ? 'var(--in-progress)' : 'var(--text-dim)';
    const totalResources = s.resources.reduce((a, r) => a + r.count, 0);
    const isExpanded = expandedSections.has(s.id) ? 'expanded' : '';

    const tasksHTML = s.tasks.map(t => {
      const st = taskStatus[t.id];
      return `<div class="task-row" data-status="${st}" onclick="cycleTask('${t.id}')">
        <div class="task-check">${checkIcon[st]}</div>
        <span class="task-text">${t.text}</span>
        <button class="task-status-btn ${statusClass[st]}">${statusLabel[st]}</button>
      </div>`;
    }).join('');

    const frameworksHTML = s.frameworks.map(f => `<span class="framework-chip">${f}</span>`).join('');
    const resourcesHTML = s.resources.map(r =>
      `<div class="resource-item"><span class="resource-icon">${r.icon}</span>${r.label}<span class="resource-count">×${r.count}</span></div>`
    ).join('');

    return `<div class="section-card ${isExpanded}" id="card-${s.id}">
      <div class="section-header" onclick="toggleSection('${s.id}')">
        <span class="section-num">${s.num}</span>
        <span class="section-title">${s.title}</span>
        <div class="section-meta">
          <span class="resource-badge">📚 ${totalResources} resources</span>
          <span class="section-pct" style="color:${pctColor}">${pct}%</span>
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="section-prog-bar">
        <div class="section-prog-fill" style="width:${pct}%;background:${progColor}"></div>
      </div>
      <div class="section-body">
        <p class="section-intro">${s.intro}</p>
        <div class="frameworks-row">${frameworksHTML}</div>
        <div class="tasks-list">${tasksHTML}</div>
        <div class="resources-section">
          <div class="resources-label">Resources Required</div>
          <div class="resources-grid">${resourcesHTML}</div>
        </div>
        <div class="tip-box"><span class="tip-icon">💡</span><span>${s.tip}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderOverall() {
  const pct = getOverallProgress();
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('overallPct').textContent = pct + '%';
}

function renderAll() {
  renderOverall();
  renderSidebar();
  renderSections();
}

// ── INIT ──────────────────────────────────────────────────────
loadFromSupabase();
</script>
</body>
</html>
